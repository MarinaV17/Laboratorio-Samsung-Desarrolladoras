<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Laboratorio</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="images/success-icon.png" />
    <link href="style.css" rel="stylesheet" />
  </head>

  <body>
    <form>
      <h1>Create Account</h1>
      <div class="input-span">
        <p>Nombre</p>
        <input
          name="name"
          id="name"
          type="text"
          class="form-element"
          value=""
        />
        <span id="name-error"></span>
      </div>
      <div class="input-span">
        <p>Email</p>
        <input
          name="email"
          id="email"
          type="email"
          class="form-element"
          value=""
        />
        <span id="email-error"></span>
      </div>
      <div class="input-span">
        <p>Clave</p>
        <input
          name="password"
          id="password"
          type="password"
          class="form-element"
          value=""
        />
        <span id="password-error"></span>
      </div>
      <div class="input-span">
        <p>Confirme su clave</p>
        <input
          name="password-confirmation"
          id="password-confirmation"
          type="password"
          class="form-element"
          value=""
        />
        <span id="password-confirmation-error"></span>
      </div>
      <input
        value="ENVIAR"
        id="button"
        type="submit"
        onclick="return nameValid(), emailValid(), passwordValid(), passwordConfirmationValid(), formValid()"
      />
    </form>
    <script src="index.js" type="text/javascript"></script>
  </body>
</html>
